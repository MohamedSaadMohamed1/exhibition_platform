name: exhibition_platform
description: Exhibition & Supplier Booking Platform with Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # Routing
  go_router: ^14.3.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI Components
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Phone Input
  intl_phone_field: ^3.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  connectivity_plus: ^6.0.5
  crypto: ^3.0.3
  path: ^1.9.0
  image: ^4.2.0
  flutter_local_notifications: ^17.2.2
  timeago: ^3.7.0

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  # riverpod_lint temporarily disabled due to analyzer version conflicts
  # riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
